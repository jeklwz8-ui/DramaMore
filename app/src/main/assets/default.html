<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        .page-top {
            width: 100%;
            align-items: center;
            justify-content: center;
            display: flex;
        }

        .search-bar {
            width: 80%;
            max-width: 600px;
            height: 30px;
            background-color: white;
            border: 1px solid #DADCE0;
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 2px;
            position: relative;
        }

        .search-icon {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            background-image: url('images/google.png');
            background-repeat: no-repeat;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
        }

        .mic-icon {
            width: 24px;
            height: 24px;
            background-image: url('images/mic.png');
            background-repeat: no-repeat;
        }

        .avatar-icon {
            width: 27px;
            height: 27px;
            border-radius: 50%;
            background-image: url('images/user-icon.png');
            background-repeat: no-repeat;
            background-size: contain;
            margin-left: 5px;
        }

        .content {
            margin-top: 30px;
            text-align: left;
            display: flex;
        }

        .content-offline {
            font-size: 16px;
            color: #202124;
            margin-bottom: 10px;
        }

        .content-check {
            font-size: 14px;
            color: #5F6368;
            margin-bottom: 24px;
        }

        .wifi-icon {
            width: 40px;
            height: 40px;
            background-image: url('images/wifi.png');
            background-repeat: no-repeat;
            background-size: contain;
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <!-- 搜索栏区域 -->
    <div class="page-top">
        <div class="search-bar">
            <div class="search-icon"></div>
            <input type="text" class="search-input" placeholder="">
            <div class="mic-icon"></div>

        </div>
        <div class="avatar-icon"></div>
    </div>


    <!-- 内容区域 -->
    <div class="content">
        <div class="left">
            <p class="content-offline">It looks like you're offline</p>
            <p class="content-check">Check your internet connection and try again</p>
        </div>
        <div class="right">
            <div class="wifi-icon"></div>
        </div>
    </div>
</body>

</html>
